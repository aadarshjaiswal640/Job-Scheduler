kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api", "/ws"]

[services.development]
run = "cd /home/runner/workspace && /home/runner/workspace/.venv/bin/python3 -m uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT --reload"

[services.production]

[services.production.build]
args = ["echo", "build-not-needed"]

[services.production.run]
args = ["sh", "-c", "cd /home/runner/workspace && /home/runner/workspace/.venv/bin/python3 -m uvicorn backend.app.main:app --host 0.0.0.0 --port 8080"]

[services.production.run.env]
PORT = "8080"

[services.production.health.startup]
path = "/api/healthz"
